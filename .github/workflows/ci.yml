name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint is advisory until pre-existing violations are resolved (see TECH_DEBT_AUDIT.md M7).
      # The --fix flag in the lint script means unfixable errors still surface as warnings here.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests --forceExit

  mobile:
    name: Mobile — lint / typecheck / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint is advisory until pre-existing violations are resolved (see TECH_DEBT_AUDIT.md M7).
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --passWithNoTests --watchAll=false
