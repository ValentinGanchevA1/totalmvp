services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: g88-postgres
    environment:
      POSTGRES_USER: g88user
      POSTGRES_PASSWORD: g88password
      POSTGRES_DB: g88db
    ports:
      - "5433:5432"
    volumes:
      - g88-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g88user -d g88db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: g88-redis
    ports:
      - "6380:6379"
    volumes:
      - g88-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  g88-postgres-data:
  g88-redis-data:
